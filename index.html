<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Testes Gitflow</title>
</head>
<body>
    <div class="container">
        <h1>Cadastro</h1>
        <form id="formCadastro">
            <input type="text" id="nome" placeholder="Insira seu nome" required>
            <input type="email" id="email" placeholder="Insira seu e-mail" required>
            <input type="senha" id="senha" placeholder="Insira sua senha" required>
            <input type="number" id="idade" placeholder="Insira sua Idade" required>
            <button type="submit">Cadastrar</button>
        </form>
        <script src="scripts.js"></script>
    </div>
    
    
</body>
</html>
